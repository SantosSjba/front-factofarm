@if (tree) {
<div
  class="dark:bg-white/[0.02] rounded-xl border border-gray-200 bg-gray-50 p-4 dark:border-gray-800"
>
  <label class="flex cursor-pointer items-start gap-3">
    <input
      type="checkbox"
      class="mt-1 size-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500"
      [checked]="allChildrenChecked()"
      (change)="onParent($event)"
    />
    <span class="font-medium text-gray-800 dark:text-white/90">{{
      tree.label ?? tree.code
    }}</span>
  </label>
  <div class="mt-3 space-y-2 border-l border-gray-200 pl-6 dark:border-gray-700">
    @for (c of tree.children; track c.id) {
    <label class="flex cursor-pointer items-center gap-3">
      <input
        type="checkbox"
        class="size-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500"
        [checked]="isChildChecked(c.code)"
        (change)="onChild(c.code, $event)"
      />
      <span class="text-theme-sm text-gray-700 dark:text-gray-300">{{ c.label ?? c.code }}</span>
    </label>
    }
  </div>
</div>
} @else {
<p class="text-theme-sm text-gray-500">No hay catálogo de permisos.</p>
}
