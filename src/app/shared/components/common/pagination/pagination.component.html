<div class="flex items-center flex-col sm:flex-row justify-between border-t border-gray-200 px-5 py-4 dark:border-gray-800">
  <div class="pb-3 sm:pb-0">
    <span class="block text-sm font-medium text-gray-500 dark:text-gray-400">
      Mostrando <span class="text-gray-800 dark:text-white/90">{{ startEntry }}</span> a
      <span class="text-gray-800 dark:text-white/90">{{ endEntry }}</span> de
      <span class="text-gray-800 dark:text-white/90">{{ totalItems }}</span>
    </span>
  </div>

  <div class="flex items-center justify-between p-4 sm:p-0 rounded-lg w-full sm:w-auto bg-gray-50 dark:bg-white/[0.03] dark:sm:bg-transparent sm:bg-transparent gap-2 sm:justify-normal">
    <button
      type="button"
      class="shadow-theme-xs flex items-center gap-2 rounded-lg border border-gray-300 bg-white p-2 text-gray-700 hover:bg-gray-50 hover:text-gray-800 sm:p-2.5 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
      [ngClass]="{ 'opacity-50 cursor-not-allowed': currentPage === 1 }"
      [disabled]="currentPage === 1"
      (click)="previousPage()"
    >
      <app-icon name="lucide:chevron-left" width="20" height="20" />
    </button>

    <span class="block text-sm font-medium text-gray-700 sm:hidden dark:text-gray-400">
      Página {{ currentPage }} de {{ totalPages }}
    </span>

    <ul class="hidden items-center gap-0.5 sm:flex">
      @for (page of visiblePages; track page) {
        <li>
          <button
            type="button"
            (click)="goToPage(page)"
            class="flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium"
            [ngClass]="{
              'bg-brand-500 text-white': page === currentPage,
              'hover:bg-brand-500 text-gray-700 hover:text-white dark:text-gray-400 dark:hover:text-white': page !== currentPage
            }"
          >
            {{ page }}
          </button>
        </li>
      }
      @if (visiblePages.length > 0 && visiblePages[visiblePages.length - 1] < totalPages) {
        <li>
          <span class="flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium text-gray-700 dark:text-gray-400">...</span>
        </li>
        <li>
          <button
            type="button"
            (click)="goToPage(totalPages)"
            class="hover:bg-brand-500 flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium text-gray-700 hover:text-white dark:text-gray-400 dark:hover:text-white"
          >
            {{ totalPages }}
          </button>
        </li>
      }
    </ul>

    <button
      type="button"
      class="shadow-theme-xs flex items-center gap-2 rounded-lg border border-gray-300 bg-white p-2 text-gray-700 hover:bg-gray-50 hover:text-gray-800 sm:p-2.5 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
      [ngClass]="{ 'opacity-50 cursor-not-allowed': currentPage === totalPages }"
      [disabled]="currentPage === totalPages"
      (click)="nextPage()"
    >
      <app-icon name="lucide:chevron-right" width="20" height="20" />
    </button>
  </div>
</div>
