<div class="flex items-start gap-4">
  <div [class]="'relative shrink-0 ' + sizeClass">
    <button
      type="button"
      class="flex h-full w-full items-center justify-center rounded-xl border-2 border-dashed border-gray-300 text-2xl text-gray-400 hover:border-brand-400 hover:text-brand-500 dark:border-gray-600"
      (click)="inp.click()"
      [attr.aria-label]="ariaLabel"
    >
      @if (previewUrl) {
        <img [src]="previewUrl" alt="" class="h-full w-full rounded-[10px] object-cover" />
      } @else {
        +
      }
    </button>
    <input #inp type="file" [accept]="accept" class="sr-only" (change)="onChange($event)" />
  </div>
  <div class="min-w-0 flex-1 text-theme-sm text-gray-500 dark:text-gray-400">
    <ng-content />
  </div>
</div>
