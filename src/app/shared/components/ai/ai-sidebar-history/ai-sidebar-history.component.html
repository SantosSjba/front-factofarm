@if (isSidebarOpen) {
  <aside
    class="fixed inset-y-0 right-0 z-40 w-72 border-l border-gray-200 bg-white shadow-xl dark:border-gray-800 dark:bg-gray-900 xl:static xl:z-auto xl:w-64 xl:border-l-0 xl:bg-transparent xl:shadow-none"
  >
    <div class="flex items-center justify-between border-b border-gray-200 px-4 py-3 dark:border-gray-800 xl:hidden">
      <span class="text-sm font-medium text-gray-800 dark:text-white/90">Historial</span>
      <button
        type="button"
        (click)="onClose()"
        class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5"
        aria-label="Cerrar"
      >
        <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="p-4 text-sm text-gray-500 dark:text-gray-400">
      <p class="mb-2 font-medium text-gray-700 dark:text-gray-300">Chats recientes</p>
      <ul class="space-y-2">
        <li class="truncate rounded-lg px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-white/5">Nueva conversación</li>
      </ul>
    </div>
  </aside>
}
