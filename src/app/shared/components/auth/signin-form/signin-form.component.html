<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>
    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
        FactoFarm · Iniciar sesión
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Sistema de farmacia: accede con tu correo y contraseña.
      </p>
    </div>

    <form (ngSubmit)="onSignIn()" class="space-y-6">
      <div>
        <app-label>Correo electrónico <span class="text-error-500">*</span></app-label>
        <app-input-field
          type="email"
          placeholder="tu.correo@ejemplo.com"
          [value]="email"
          (valueChange)="email = $event + ''"
          name="email"
          class="form-input"
          required
        />
      </div>

      <div>
        <app-label>Contraseña <span class="text-error-500">*</span></app-label>
        <div class="relative">
          <app-input-field
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Tu contraseña"
            [value]="password"
            (valueChange)="password = $event + ''"
            name="password"
            class="form-input"
            required
          />
          <span
            (click)="togglePasswordVisibility()"
            class="absolute z-30 -translate-y-1/2 cursor-pointer right-4 top-1/2"
            role="button"
            tabindex="0"
            (keydown.enter)="togglePasswordVisibility()"
          >
            @if (showPassword) {
              <app-icon name="mdi:eye-outline" iconClass="size-5 text-gray-500 dark:text-gray-400" />
            } @else {
              <app-icon name="mdi:eye-off-outline" iconClass="size-5 text-gray-500 dark:text-gray-400" />
            }
          </span>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <app-checkbox
            [(checked)]="isChecked"
            label="Mantener sesión iniciada"
          />
        </div>
        <span class="text-sm text-gray-400 cursor-not-allowed" title="Función próximamente">
          ¿Olvidaste tu contraseña?
        </span>
      </div>

      <app-button
        className="w-full"
        size="sm"
        [disabled]="isLoading"
        (btnClick)="onSignIn()"
      >
        {{ isLoading ? 'Entrando…' : 'Iniciar sesión' }}
      </app-button>
    </form>

    <div class="mt-5">
      <p class="text-sm font-normal text-center text-gray-700 dark:text-gray-400 sm:text-start">
        ¿No tienes cuenta?
        <a
          routerLink="/auth/signup"
          class="text-brand-500 hover:text-brand-600 dark:text-brand-400"
        >
          Registrarse
        </a>
      </p>
    </div>
  </div>
</div>
